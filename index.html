<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="login-container shadow-lg p-4 rounded-4 bg-white text-center">
        <div class="profile-icon mb-3">
            <img src="boy-girl_loginlogo.png" alt="User Icon" width="80">
        </div>

        <h1 class="mb-4 fw-bold">LOG-IN</h1>

        <details id="instructionToggle" class="mb-3 text-muted">
            <summary class="btn btn-sm btn-outline-secondary">Show Instructions</summary>
            <p class="mt-2 small">Enter your credentials to access your account.</p>
        </details>

        <form id="loginForm">
            <div class="mb-3 text-start">
                <label for="username" class="form-label fw-bold">Username / Email:</label>
                <input type="text" id="username" class="form-control bg-dark text-white" placeholder="Enter here" required>
            </div>
            <div class="mb-3 text-start">
                <label for="password" class="form-label fw-bold">Password:</label>
                <input type="password" id="password" class="form-control bg-dark text-white" placeholder="********" required>
            </div>
            
            <div class="mb-3 form-check text-start">
                <input type="checkbox" class="form-check-input" id="rememberMe">
                <label class="form-check-label" for="rememberMe">Remember me</label>
            </div>

            <div class="d-flex justify-content-between gap-2 mt-4">
                <button type="reset" class="btn btn-danger flex-grow-1 py-2">Cancel</button>
                <button type="submit" class="btn btn-primary flex-grow-1 py-2">Login</button>
            </div>
        </form>

        <div class="mt-4">
            <a href="https://github.com" target="_blank" class="text-decoration-none small">Forgot Username / Password?</a>
        </div>
        
        <p class="mt-3 x-small">Sources: <a href="https://www.w3schools.com" target="_blank">W3Schools</a></p>
    </div>

    <script src="main.js"></script>
</body>
</html>
